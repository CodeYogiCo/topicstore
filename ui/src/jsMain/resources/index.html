<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopicStore</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #0f1115; color: #e6e6e6; }
        a { color: #6ea8fe; }
        button, input, select, textarea { font: inherit; }
        button { background: #2563eb; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        button.danger { background: #b91c1c; }
        button.ghost { background: #1f2937; }
        input, select, textarea { background: #1a1d24; color: #e6e6e6; border: 1px solid #2a2f3a; border-radius: 6px; padding: 8px 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #1f2937; font-size: 13px; vertical-align: top; }
        th { background: #151821; }
        nav { padding: 14px 24px; background: #151821; border-bottom: 1px solid #1f2937; display: flex; gap: 16px; align-items: center; }
        .spacer { flex: 1; }
        .error { color: #fecaca; margin-top: 8px; }
        .muted { color: #94a3b8; font-size: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        nav a { color: #cbd5e1; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
        nav a.active { background: #1f2937; color: #fff; }
        main { padding: 24px; max-width: 1200px; margin: 0 auto; }
        .card { background: #151821; border: 1px solid #1f2937; border-radius: 10px; padding: 18px; margin-bottom: 18px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
        .col { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; color: #94a3b8; }
        .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #1f2937; color: #cbd5e1; }
        .pill.green { background: #064e3b; color: #6ee7b7; }
        .pill.red { background: #7f1d1d; color: #fecaca; }
        pre { background: #0b0d12; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 0; font-size: 12px; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
